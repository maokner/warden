<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Warden integration surfaces</title>
  <desc id="desc">Warden supports OpenAI Agents SDK function tools, any JavaScript function, MCP gateway tools, and HTTP decision sidecar integrations. All surfaces feed the same classifier, policy engine, approval, and audit pipeline.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27313d"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .surface { fill: #ffffff; stroke: #d8e0e9; stroke-width: 2; rx: 18; }
      .core { fill: #eef6ff; stroke: #4e87c2; stroke-width: 2; rx: 18; }
      .approval { fill: #ecfaf5; stroke: #45a582; stroke-width: 2; rx: 18; }
      .audit { fill: #fff6e2; stroke: #c18b2e; stroke-width: 2; rx: 18; }
      .title { font: 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 700; fill: #17202a; }
      .text { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .small { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5868; }
      .label { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #657386; letter-spacing: 1px; }
      .line { stroke: #27313d; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="title" x="60" y="62">One policy pipeline, several ways to adopt it</text>
  <text class="small" x="60" y="92">Start with the surface closest to your existing app. They all use the same decisions and audit format.</text>

  <rect class="surface" x="60" y="150" width="220" height="100" rx="18"/>
  <text class="label" x="92" y="180">OpenAI apps</text>
  <text class="text" x="92" y="213">guardTools()</text>
  <text class="small" x="92" y="237">wrap existing tool array</text>

  <rect class="surface" x="60" y="300" width="220" height="100" rx="18"/>
  <text class="label" x="92" y="330">JavaScript code</text>
  <text class="text" x="92" y="363">guard()</text>
  <text class="small" x="92" y="387">wrap one function</text>

  <rect class="surface" x="60" y="450" width="220" height="100" rx="18"/>
  <text class="label" x="92" y="480">Other stacks</text>
  <text class="text" x="92" y="513">HTTP sidecar</text>
  <text class="small" x="92" y="537">ask /v1/decide</text>

  <rect class="surface" x="840" y="225" width="220" height="100" rx="18"/>
  <text class="label" x="872" y="255">MCP tools</text>
  <text class="text" x="872" y="288">warden proxy</text>
  <text class="small" x="872" y="312">namespace upstream tools</text>

  <rect class="core" x="390" y="175" width="300" height="230" rx="18"/>
  <text class="label" x="428" y="210">Warden core</text>
  <text class="text" x="428" y="245">Classifier</text>
  <text class="small" x="428" y="269">risk labels from metadata and args</text>
  <text class="text" x="428" y="315">Policy engine</text>
  <text class="small" x="428" y="339">allow, deny, require approval</text>
  <text class="text" x="428" y="385">Executor gate</text>

  <rect class="approval" x="390" y="455" width="140" height="80" rx="18"/>
  <text class="text" x="425" y="494">Telegram</text>
  <text class="small" x="425" y="517">approval</text>

  <rect class="audit" x="550" y="455" width="140" height="80" rx="18"/>
  <text class="text" x="590" y="494">Audit</text>
  <text class="small" x="590" y="517">JSONL</text>

  <path class="line" d="M280 200 C330 200 340 230 390 230"/>
  <path class="line" d="M280 350 C330 350 340 320 390 320"/>
  <path class="line" d="M280 500 C340 500 350 385 390 385"/>
  <path class="line" d="M840 275 C770 275 745 275 690 275"/>
  <path class="line" d="M510 405 C510 430 482 430 462 455"/>
  <path class="line" d="M610 405 C610 430 620 430 620 455"/>
</svg>
