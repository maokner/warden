<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Warden action flow for OpenAI Agents SDK apps</title>
  <desc id="desc">An OpenAI agent calls a guarded tool. Warden classifies risk, checks policy, allows safe calls, blocks denied calls, sends risky calls to Telegram approval, and writes audit logs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27313d"/>
    </marker>
    <style>
      .bg { fill: #f7f9fb; }
      .panel { fill: #ffffff; stroke: #d7dde5; stroke-width: 2; rx: 18; }
      .warden { fill: #eef6ff; stroke: #4c84c3; stroke-width: 2; rx: 18; }
      .telegram { fill: #edf9f6; stroke: #3f9f87; stroke-width: 2; rx: 18; }
      .audit { fill: #fff6e6; stroke: #c48a2c; stroke-width: 2; rx: 18; }
      .danger { fill: #fff0f0; stroke: #c75d5d; stroke-width: 2; rx: 18; }
      .text { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18212b; }
      .small { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #485566; }
      .label { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #657386; text-transform: uppercase; letter-spacing: 1px; }
      .title { font: 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 700; fill: #17202a; }
      .line { stroke: #27313d; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #6f7d8d; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="620"/>
  <text class="title" x="60" y="62">Warden guards risky agent actions</text>
  <text class="small" x="60" y="92">Warden runs in your app process, between the OpenAI Agents SDK tool call and the real side effect.</text>

  <rect class="panel" x="60" y="150" width="190" height="110" rx="18"/>
  <text class="label" x="88" y="183">Your app</text>
  <text class="text" x="88" y="214">OpenAI Agent</text>
  <text class="small" x="88" y="240">Existing tool array</text>

  <rect class="warden" x="340" y="126" width="280" height="295" rx="18"/>
  <text class="label" x="375" y="162">Warden guardTools</text>
  <text class="text" x="375" y="195">Classify tool call</text>
  <text class="small" x="375" y="222">name, description, schema, args, SQL</text>
  <line x1="374" y1="246" x2="586" y2="246" stroke="#bed4ed" stroke-width="2"/>
  <text class="text" x="375" y="282">Evaluate policy</text>
  <text class="small" x="375" y="309">allow, deny, require approval</text>
  <line x1="374" y1="333" x2="586" y2="333" stroke="#bed4ed" stroke-width="2"/>
  <text class="text" x="375" y="369">Create audit event</text>
  <text class="small" x="375" y="396">redacted request and final outcome</text>

  <rect class="panel" x="730" y="130" width="250" height="100" rx="18"/>
  <text class="label" x="765" y="162">Allowed</text>
  <text class="text" x="765" y="193">Run real tool</text>
  <text class="small" x="765" y="216">database, API, email, backend job</text>

  <rect class="telegram" x="730" y="275" width="250" height="110" rx="18"/>
  <text class="label" x="765" y="307">Approval</text>
  <text class="text" x="765" y="338">Telegram poll</text>
  <text class="small" x="765" y="363">Approve or deny from phone</text>

  <rect class="danger" x="730" y="430" width="250" height="90" rx="18"/>
  <text class="label" x="765" y="461">Denied</text>
  <text class="text" x="765" y="493">Never reaches tool</text>

  <rect class="audit" x="340" y="470" width="280" height="90" rx="18"/>
  <text class="label" x="375" y="501">Audit</text>
  <text class="text" x="375" y="533">.warden/audit.jsonl</text>

  <path class="line" d="M250 205 C285 205 300 205 340 205"/>
  <path class="line" d="M620 185 C660 185 685 180 730 180"/>
  <path class="line" d="M620 325 C660 325 685 330 730 330"/>
  <path class="line" d="M620 475 C660 475 685 475 730 475"/>
  <path class="dash" d="M855 385 C855 415 810 415 810 430"/>
  <path class="dash" d="M480 421 C480 444 480 450 480 470"/>
</svg>
