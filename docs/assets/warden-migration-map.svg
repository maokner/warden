<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Migrating an existing OpenAI Agents SDK app to Warden</title>
  <desc id="desc">Before migration, the agent calls raw tools directly. After migration, the same tool definitions are wrapped with guardTools and risky calls route through Warden policy and Telegram approval.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263241"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #d9e0e8; stroke-width: 2; rx: 16; }
      .raw { fill: #fff2f0; stroke: #c96b5e; stroke-width: 2; rx: 16; }
      .guard { fill: #edf7ff; stroke: #4f8bc9; stroke-width: 2; rx: 16; }
      .approval { fill: #ecfaf5; stroke: #42a37f; stroke-width: 2; rx: 16; }
      .audit { fill: #fff6df; stroke: #c38a2b; stroke-width: 2; rx: 16; }
      .text { font: 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .small { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5868; }
      .label { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667488; letter-spacing: 1px; }
      .title { font: 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 700; fill: #17202a; }
      .line { stroke: #263241; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .split { stroke: #c8d0db; stroke-width: 2; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="620"/>
  <text class="title" x="60" y="62">Migration map: keep your tools, add Warden at the boundary</text>
  <text class="small" x="60" y="92">The migration should be a small wrapper change, not a rewrite of the agent or the business logic.</text>
  <line class="split" x1="560" y1="130" x2="560" y2="560"/>

  <text class="label" x="60" y="145">Before</text>
  <rect class="box" x="70" y="175" width="180" height="85" rx="16"/>
  <text class="text" x="100" y="213">Agent</text>
  <text class="small" x="100" y="238">@openai/agents</text>

  <rect class="raw" x="310" y="175" width="180" height="85" rx="16"/>
  <text class="text" x="340" y="213">Raw tools</text>
  <text class="small" x="340" y="238">execute directly</text>

  <rect class="raw" x="310" y="330" width="180" height="85" rx="16"/>
  <text class="text" x="340" y="368">Side effects</text>
  <text class="small" x="340" y="393">refunds, sends, writes</text>

  <path class="line" d="M250 218 L310 218"/>
  <path class="line" d="M400 260 L400 330"/>
  <text class="small" x="90" y="500">Problem: if the model chooses a risky tool,</text>
  <text class="small" x="90" y="522">the action can execute before a human sees it.</text>

  <text class="label" x="610" y="145">After</text>
  <rect class="box" x="620" y="175" width="150" height="85" rx="16"/>
  <text class="text" x="650" y="213">Agent</text>
  <text class="small" x="650" y="238">unchanged</text>

  <rect class="guard" x="820" y="155" width="220" height="125" rx="16"/>
  <text class="text" x="850" y="194">guardTools()</text>
  <text class="small" x="850" y="219">same tool definitions</text>
  <text class="small" x="850" y="242">policy before execute</text>

  <rect class="approval" x="650" y="335" width="185" height="90" rx="16"/>
  <text class="text" x="680" y="373">Telegram</text>
  <text class="small" x="680" y="398">approve risky calls</text>

  <rect class="box" x="890" y="335" width="150" height="90" rx="16"/>
  <text class="text" x="920" y="373">Tools</text>
  <text class="small" x="920" y="398">run if allowed</text>

  <rect class="audit" x="750" y="475" width="185" height="70" rx="16"/>
  <text class="text" x="785" y="517">Audit log</text>

  <path class="line" d="M770 218 L820 218"/>
  <path class="line" d="M930 280 C930 310 965 310 965 335"/>
  <path class="line" d="M880 280 C830 315 770 315 742 335"/>
  <path class="line" d="M742 425 C742 462 780 462 810 475"/>
  <path class="line" d="M965 425 C965 462 900 462 875 475"/>
</svg>
